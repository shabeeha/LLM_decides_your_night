<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Countdown 🔥</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="page-timer">

  <div class="card timer-card">
    <div class="timer-emoji">⏳</div>
    <h2 class="timer-title">The night begins in…</h2>
    <p class="timer-sub">Friday, 10th April — 9:00 PM</p>

    <div class="countdown" id="countdown">
      <div class="countdown-block">
        <span class="countdown-num" id="days">--</span>
        <span class="countdown-label">Days</span>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-block">
        <span class="countdown-num" id="hours">--</span>
        <span class="countdown-label">Hours</span>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-block">
        <span class="countdown-num" id="minutes">--</span>
        <span class="countdown-label">Minutes</span>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-block">
        <span class="countdown-num" id="seconds">--</span>
        <span class="countdown-label">Seconds</span>
      </div>
    </div>

    <p class="timer-tease">Get ready for the most fun,<br><em>wild, crazy night of your life 🔥</em></p>
  </div>

  <script>
    const target = new Date('2026-04-10T21:00:00').getTime();

    function update() {
      const now = Date.now();
      const diff = target - now;

      if (diff <= 0) {
        document.getElementById('countdown').innerHTML = '<p class="its-time">It\'s time! 🎉🔥</p>';
        return;
      }

      const days    = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours   = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('days').textContent    = String(days).padStart(2, '0');
      document.getElementById('hours').textContent   = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    update();
    setInterval(update, 1000);
  </script>

</body>
</html>
